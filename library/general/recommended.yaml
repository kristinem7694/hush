# DISCLAIMER: Review and customize for your environment. Add
# organization-specific egress allowlists and forbidden paths as needed.
hushspec: "0.1.0"
name: recommended
description: >
  Production baseline. Extends the default with broad secret detection,
  sensible patch limits, and blocks for known-dangerous tools.
extends: "builtin:default"

rules:
  secret_patterns:
    patterns:
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
        description: "AWS access key ID"
      - name: aws_secret_key
        pattern: "(?i)aws_secret_access_key\\s*[:=]\\s*[A-Za-z0-9/+=]{40}"
        severity: critical
        description: "AWS secret access key"
      - name: github_token
        pattern: "gh[ps]_[A-Za-z0-9]{36}"
        severity: critical
        description: "GitHub personal access token"
      - name: openai_key
        pattern: "sk-[A-Za-z0-9]{48}"
        severity: critical
        description: "OpenAI API key"
      - name: anthropic_key
        pattern: "sk-ant-[A-Za-z0-9\\-]{95}"
        severity: critical
        description: "Anthropic API key"
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
        description: "Private key material"
      - name: npm_token
        pattern: "npm_[A-Za-z0-9]{36}"
        severity: critical
        description: "NPM publish token"
      - name: slack_token
        pattern: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*"
        severity: critical
        description: "Slack API token"
      - name: generic_api_key
        pattern: "(?i)(api[_\\-]?key|apikey)\\s*[:=]\\s*[A-Za-z0-9]{32,}"
        severity: error
        description: "Generic API key pattern"
      - name: connection_string
        pattern: "(?i)(postgres|mysql|mongodb|redis|amqp)://[^\\s\"']{10,}"
        severity: critical
        description: "Database connection string"
      - name: jwt_token
        pattern: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]+"
        severity: error
        description: "JWT token"
      - name: ssn
        pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        severity: critical
        description: "Social Security Number"
    skip_paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/fixtures/**"
      - "**/*.test.*"
      - "**/*_test.*"

  patch_integrity:
    max_additions: 1000
    max_deletions: 500
    require_balance: false
    max_imbalance_ratio: 10.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"
      - "(?i)eval\\s*\\("

  shell_commands:
    forbidden_patterns:
      - "(?i)rm\\s+-rf\\s+/"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*bash"
      - "(?i)chmod\\s+777"

  tool_access:
    allow: []
    block:
      - shell_exec
      - run_command
      - raw_file_write
      - raw_file_delete
    require_confirmation:
      - file_write
      - file_delete
      - git_push
      - deploy
      - publish
    default: allow
    max_args_size: 1048576

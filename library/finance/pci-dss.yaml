# Compliance: PCI-DSS v4.0 Requirements 3.2, 3.4, 4.1, 6.3, 7.1, 10.2
#
# DISCLAIMER: Starting point only. Engage a QSA and customize for your
# cardholder data environment (CDE) before production use.
hushspec: "0.1.0"
name: pci-dss
description: >
  PCI-DSS v4.0 aligned policy. Detects card numbers and SAD, restricts
  access to CHD directories, and limits egress to PCI-compliant endpoints.
extends: "builtin:strict"

rules:
  # --- Requirement 7.1: Restrict access to system components and CHD ---
  forbidden_paths:
    patterns:
      # Cardholder data directories
      - "**/cardholder*/**"
      - "**/chd/**"
      - "**/card-data/**"
      - "**/card_data/**"
      - "**/payment-data/**"
      - "**/payment_data/**"
      - "**/pan/**"
      - "**/transactions/**"
      # Key management -- Requirement 3.4
      - "**/encryption-keys/**"
      - "**/encryption_keys/**"
      - "**/key-store/**"
      - "**/keystore/**"
      - "**/hsm/**"
      # PCI audit logs -- Requirement 10.2
      - "**/pci-audit/**"
      - "**/audit-logs/**"
      - "**/compliance-logs/**"
      # Credential stores
      - "**/.ssh/**"
      - "**/.aws/**"
      - "**/.env"
      - "**/.env.*"
      - "**/.git-credentials"
      - "**/.gnupg/**"
      - "**/.kube/**"
      - "**/.docker/**"
      - "**/.npmrc"
      - "**/.password-store/**"
      - "**/.1password/**"
      - "/etc/shadow"
      - "/etc/passwd"
      - "/etc/sudoers"
      # Database files
      - "**/*.sqlite"
      - "**/*.db"
      - "**/*.dump"
      - "**/*.sql.gz"
    exceptions:
      - "**/.env.example"
      - "**/.env.template"

  # --- Requirement 4.1: Protect CHD during transmission ---
  egress:
    allow:
      # Payment processors
      - "api.stripe.com"
      - "api.braintreegateway.com"
      - "api.square.com"
      - "api.adyen.com"
      - "api.paypal.com"
      # Package registries
      - "registry.npmjs.org"
      - "pypi.org"
      - "files.pythonhosted.org"
      - "crates.io"
      - "static.crates.io"
    block:
      # Data-sharing platforms
      - "*.pastebin.com"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.wetransfer.com"
      # Consumer storage
      - "*.dropbox.com"
      - "drive.google.com"
      - "*.onedrive.live.com"
      # Social media
      - "*.twitter.com"
      - "*.x.com"
      - "*.facebook.com"
      - "*.reddit.com"
    default: block

  # --- Requirements 3.2, 3.4: Protect stored CHD and SAD ---
  secret_patterns:
    patterns:
      # Requirement 3.4 -- payment card numbers
      - name: visa_card
        pattern: "\\b4[0-9]{12}(?:[0-9]{3})?\\b"
        severity: critical
        description: "Visa card number -- PCI-DSS Req 3.4"
      - name: mastercard
        pattern: "\\b(?:5[1-5][0-9]{2}|222[1-9]|22[3-9][0-9]|2[3-6][0-9]{2}|27[01][0-9]|2720)[0-9]{12}\\b"
        severity: critical
        description: "Mastercard number -- PCI-DSS Req 3.4"
      - name: amex_card
        pattern: "\\b3[47][0-9]{13}\\b"
        severity: critical
        description: "American Express card number -- PCI-DSS Req 3.4"
      - name: discover_card
        pattern: "\\b6(?:011|5[0-9]{2})[0-9]{12}\\b"
        severity: critical
        description: "Discover card number -- PCI-DSS Req 3.4"
      # Requirement 3.2 -- sensitive authentication data (SAD)
      - name: cvv_pattern
        pattern: "(?i)(cvv|cvc|cvv2|cvc2|cid)\\s*[:=]?\\s*\\d{3,4}"
        severity: critical
        description: "Card verification value -- PCI-DSS Req 3.2 (SAD must not be stored)"
      - name: track_data
        pattern: "%B\\d{13,19}\\^[A-Z\\s/]+\\^\\d{4}"
        severity: critical
        description: "Magnetic stripe track data -- PCI-DSS Req 3.2"
      - name: pin_block
        pattern: "(?i)(pin[\\s_-]?block)\\s*[:=]\\s*[0-9A-Fa-f]{16}"
        severity: critical
        description: "PIN block data -- PCI-DSS Req 3.2"
      # Infrastructure
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
      - name: generic_api_key
        pattern: "(?i)(api[_\\-]?key|apikey)\\s*[:=]\\s*[A-Za-z0-9]{32,}"
        severity: error
      - name: connection_string
        pattern: "(?i)(postgres|mysql|mongodb|redis)://[^\\s\"']{10,}"
        severity: critical
    skip_paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/fixtures/**"

  # --- Requirement 6.3: Secure development ---
  patch_integrity:
    max_additions: 500
    max_deletions: 200
    require_balance: true
    max_imbalance_ratio: 5.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls|encryption|audit)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"
      - "(?i)(card_number|pan|cvv|track_data|pin_block)"

  # --- Requirement 10.2: Audit trail ---
  shell_commands:
    forbidden_patterns:
      - "(?i)rm\\s+-rf\\s+/"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*bash"
      - "(?i)scp\\s"
      - "(?i)nc\\s+-"
      - "(?i)base64.*\\|.*curl"

  # --- Requirement 7.1: Restrict access ---
  tool_access:
    allow:
      - read_file
      - write_file
      - list_directory
      - search
      - grep
      - run_tests
    block:
      - shell_exec
      - run_command
      - deploy_production
      - raw_file_write
      - raw_file_delete
      - database_query
      - database_write
    require_confirmation:
      - file_write
      - file_delete
      - git_push
    default: block
    max_args_size: 524288

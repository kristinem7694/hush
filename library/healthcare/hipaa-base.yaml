# Compliance: HIPAA Security Rule (45 CFR 164.312), Privacy Rule (45 CFR 164.502)
#
# DISCLAIMER: Starting point only. Organizations MUST customize and have this
# validated by a qualified HIPAA Privacy Officer or compliance professional.
hushspec: "0.1.0"
name: hipaa-base
description: >
  HIPAA base policy. Enforces PHI protection, restricts egress to approved
  health data endpoints, and detects PHI patterns in content.
extends: "builtin:strict"

rules:
  # --- 45 CFR 164.312(a)(1): Access Control ---
  forbidden_paths:
    patterns:
      # Patient data directories
      - "**/patient*/**"
      - "**/phi/**"
      - "**/protected-health/**"
      - "**/medical_records/**"
      - "**/medical-records/**"
      - "**/health_records/**"
      - "**/health-records/**"
      - "**/ehr/**"
      - "**/emr/**"
      # HIPAA audit logs -- 45 CFR 164.312(b)
      - "**/hipaa-audit/**"
      - "**/audit-logs/**"
      # Credential stores
      - "**/.ssh/**"
      - "**/.aws/**"
      - "**/.env"
      - "**/.env.*"
      - "**/.git-credentials"
      - "**/.gnupg/**"
      - "**/.kube/**"
      - "**/.docker/**"
      - "**/.npmrc"
      - "**/.password-store/**"
      - "**/.1password/**"
      - "/etc/shadow"
      - "/etc/passwd"
      - "/etc/sudoers"
      # Database files that may contain PHI
      - "**/database.yml"
      - "**/database.yaml"
      - "**/db.conf"
      - "**/pg_hba.conf"
      # Backup files that may contain PHI
      - "**/*.bak"
      - "**/*.backup"
      - "**/*.dump"
      - "**/*.sql.gz"
    exceptions:
      - "**/.env.example"
      - "**/.env.template"

  # --- 45 CFR 164.312(e)(1): Transmission Security ---
  egress:
    allow:
      # EHR/EMR endpoints -- customize per organization
      - "api.epic.com"
      - "api.cerner.com"
      - "fhir.epic.com"
      - "*.smarthealth.cards"
      # HL7 FHIR endpoints
      - "*.fhir.org"
      # HIPAA-compliant cloud health APIs
      - "healthcare.googleapis.com"
      - "healthlake.amazonaws.com"
      - "dicom.googleapis.com"
      # Package registries
      - "registry.npmjs.org"
      - "pypi.org"
      - "files.pythonhosted.org"
      - "crates.io"
      - "static.crates.io"
    block:
      # 45 CFR 164.502: Minimum Necessary -- block data-sharing platforms
      - "*.pastebin.com"
      - "paste.ee"
      - "hastebin.com"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.wetransfer.com"
      # Consumer cloud storage
      - "*.dropbox.com"
      - "drive.google.com"
      - "*.onedrive.live.com"
      # Social media
      - "*.twitter.com"
      - "*.x.com"
      - "*.facebook.com"
      - "*.reddit.com"
      # 45 CFR 164.502(a) -- AI services that may train on data
      - "*.openai.com"
      - "*.anthropic.com"
      - "*.cohere.ai"
      - "*.huggingface.co"
    default: block

  # --- 45 CFR 164.312(c)(1): Integrity + 45 CFR 164.514: De-identification ---
  secret_patterns:
    patterns:
      # PHI Patterns -- 45 CFR 164.514(b)(2): 18 HIPAA identifiers
      - name: ssn
        pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        severity: critical
        description: "Social Security Number -- HIPAA identifier (45 CFR 164.514(b)(2)(i))"
      - name: medical_record_number
        pattern: "(?i)\\b(mrn|medical[\\s_-]?record[\\s_-]?(number|num|no))\\s*:?\\s*[A-Z0-9]{6,15}\\b"
        severity: critical
        description: "Medical Record Number -- HIPAA identifier (45 CFR 164.514(b)(2)(iv))"
      - name: health_plan_id
        pattern: "(?i)\\b(health[\\s_-]?plan[\\s_-]?(id|number|num|no))\\s*:?\\s*[A-Z0-9]{8,20}\\b"
        severity: critical
        description: "Health Plan Beneficiary Number -- HIPAA identifier (45 CFR 164.514(b)(2)(v))"
      - name: dea_number
        pattern: "\\b[A-Z][A-Z9][0-9]{7}\\b"
        severity: error
        description: "DEA Registration Number (prescriber identifier)"
      - name: npi_number
        pattern: "\\b\\d{10}\\b"
        severity: warn
        description: "National Provider Identifier (10-digit, may produce false positives)"
      - name: icd10_code_in_context
        pattern: "(?i)(diagnosis|dx|icd)[\\s_-]*(10)?[\\s_-]*:?\\s*[A-Z]\\d{2}(\\.\\d{1,4})?"
        severity: error
        description: "ICD-10 diagnosis code in clinical context"
      - name: patient_name_pattern
        pattern: "(?i)(patient[\\s_-]?(name|nm))\\s*:?\\s*[A-Z][a-z]+\\s+[A-Z][a-z]+"
        severity: critical
        description: "Patient name field -- HIPAA identifier (45 CFR 164.514(b)(2)(i))"
      - name: date_of_birth
        pattern: "(?i)(dob|date[\\s_-]?of[\\s_-]?birth)\\s*:?\\s*\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}"
        severity: critical
        description: "Date of birth -- HIPAA identifier (45 CFR 164.514(b)(2)(iii))"
      - name: phone_number_us
        pattern: "(?i)(phone|tel|mobile|cell)\\s*:?\\s*\\(?\\d{3}\\)?[\\s.-]?\\d{3}[\\s.-]?\\d{4}"
        severity: error
        description: "US phone number -- HIPAA identifier (45 CFR 164.514(b)(2)(viii))"
      # Infrastructure secrets
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
      - name: generic_api_key
        pattern: "(?i)(api[_\\-]?key|apikey)\\s*[:=]\\s*[A-Za-z0-9]{32,}"
        severity: error
      - name: connection_string
        pattern: "(?i)(postgres|mysql|mongodb|sqlserver)://[^\\s\"']{10,}"
        severity: critical
        description: "Database connection string (may contain credentials)"
    skip_paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/fixtures/**"

  # --- 45 CFR 164.312(c)(1): Integrity Controls ---
  patch_integrity:
    max_additions: 500
    max_deletions: 200
    require_balance: true
    max_imbalance_ratio: 5.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls|hipaa|audit)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check|audit)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"
      - "(?i)(patient|phi|ssn|mrn|dob)"
      - "(?i)SELECT\\s+\\*\\s+FROM.*(patient|health|medical|diagnosis)"

  # --- 45 CFR 164.312(a)(1): Shell command restrictions ---
  shell_commands:
    forbidden_patterns:
      - "(?i)rm\\s+-rf\\s+/"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*bash"
      - "(?i)curl.*(patient|phi|medical|health)"
      - "(?i)scp\\s"
      - "(?i)rsync.*--rsh"
      - "(?i)nc\\s+-"
      - "(?i)ncat\\s"
      - "(?i)base64.*\\|.*curl"
      - "(?i)(mysql|psql|mongosh?)\\s+.*-p"
      - "(?i)pg_dump"
      - "(?i)mysqldump"
      - "(?i)mongodump"

  # --- 45 CFR 164.312(a)(1): Tool access ---
  tool_access:
    allow:
      - read_file
      - write_file
      - list_directory
      - search
      - grep
      - run_tests
    block:
      - shell_exec
      - run_command
      - deploy
      - deploy_production
      - raw_file_write
      - raw_file_delete
      - database_query
      - database_write
    require_confirmation:
      - file_write
      - file_delete
      - git_push
      - git_commit
    default: block
    max_args_size: 524288

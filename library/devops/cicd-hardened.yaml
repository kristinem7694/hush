# Hardened CI/CD pipeline policy.
#
# DISCLAIMER: Customize the egress allowlist and tool access for your
# specific pipeline toolchain.
hushspec: "0.1.0"
name: cicd-hardened
description: >
  Hardened CI/CD policy. Restricts egress to package registries and build
  services, blocks credential stores, limits tools to build/test operations.
extends: "builtin:default"

rules:
  forbidden_paths:
    patterns:
      # CI/CD secrets
      - "**/.github/secrets/**"
      - "**/.gitlab-ci-secrets/**"
      - "**/.circleci/secrets/**"
      # Credential stores
      - "**/.ssh/**"
      - "**/.aws/**"
      - "**/.env"
      - "**/.env.*"
      - "**/.env.local"
      - "**/.git-credentials"
      - "**/.gnupg/**"
      - "**/.kube/**"
      - "**/.docker/**"
      - "**/.npmrc"
      - "**/.password-store/**"
      - "**/.1password/**"
      - "/etc/shadow"
      - "/etc/passwd"
      - "/etc/sudoers"
      # Deploy keys and tokens
      - "**/deploy_key*"
      - "**/credentials*"
      - "**/secrets*"
      - "**/service-account*.json"
    exceptions:
      - "**/.github/workflows/**"
      - "**/.gitlab-ci.yml"
      - "**/.circleci/config.yml"
      - "**/.env.example"
      - "**/.env.template"

  egress:
    allow:
      # Package registries
      - "*.npmjs.org"
      - "registry.npmjs.org"
      - "pypi.org"
      - "files.pythonhosted.org"
      - "crates.io"
      - "static.crates.io"
      - "rubygems.org"
      - "plugins.gradle.org"
      - "repo1.maven.org"
      - "services.gradle.org"
      # Container registries
      - "*.docker.io"
      - "*.docker.com"
      - "*.gcr.io"
      - "*.ecr.aws"
      - "ghcr.io"
      # Code hosting
      - "api.github.com"
      - "github.com"
      - "*.githubusercontent.com"
      - "gitlab.com"
      - "bitbucket.org"
      # Build and CI services
      - "*.circleci.com"
      - "*.github.com"
      - "*.gitlab.com"
    block:
      # Data exfiltration endpoints
      - "*.pastebin.com"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.wetransfer.com"
      # Social media
      - "*.twitter.com"
      - "*.x.com"
      - "*.facebook.com"
      - "*.reddit.com"
    default: block

  secret_patterns:
    patterns:
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
        description: "AWS access key in pipeline content"
      - name: aws_secret_key
        pattern: "(?i)aws_secret_access_key\\s*[:=]\\s*[A-Za-z0-9/+=]{40}"
        severity: critical
        description: "AWS secret key in pipeline content"
      - name: github_token
        pattern: "gh[ps]_[A-Za-z0-9]{36}"
        severity: critical
        description: "GitHub personal access token"
      - name: github_actions_token
        pattern: "ghs_[A-Za-z0-9]{36}"
        severity: critical
        description: "GitHub Actions installation token"
      - name: npm_token
        pattern: "npm_[A-Za-z0-9]{36}"
        severity: critical
        description: "NPM publish token"
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
        description: "Private key material in build context"
      - name: docker_auth
        pattern: "(?i)docker_password\\s*[:=]\\s*[A-Za-z0-9]{20,}"
        severity: critical
        description: "Docker registry password"
      - name: gcp_service_account
        pattern: "(?i)\"type\"\\s*:\\s*\"service_account\""
        severity: critical
        description: "GCP service account key file"
      - name: generic_api_key
        pattern: "(?i)(api[_\\-]?key|apikey)\\s*[:=]\\s*[A-Za-z0-9]{32,}"
        severity: error
      - name: connection_string
        pattern: "(?i)(postgres|mysql|mongodb|redis)://[^\\s\"']{10,}"
        severity: critical
    skip_paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/fixtures/**"

  shell_commands:
    forbidden_patterns:
      - "(?i)rm\\s+-rf\\s+/"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*bash"
      - "(?i)chmod\\s+777"
      - "(?i)nc\\s+-"
      - "(?i)ncat\\s"
      - "(?i)base64.*\\|.*curl"
      - "(?i)eval\\s*\\("
      - "(?i)curl.*\\$\\{"

  patch_integrity:
    max_additions: 2000
    max_deletions: 1000
    require_balance: false
    max_imbalance_ratio: 10.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"

  tool_access:
    allow:
      - read_file
      - write_file
      - list_directory
      - search
      - grep
      - run_tests
      - build
      - lint
      - format
    block:
      - shell_exec
      - deploy_production
      - raw_file_delete
      - database_query
      - database_write
    require_confirmation:
      - deploy
      - publish
      - git_push
    default: block
    max_args_size: 1048576

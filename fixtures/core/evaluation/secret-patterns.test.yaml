hushspec_test: "0.1.0"
description: "Secret pattern detection evaluation"
policy:
  hushspec: "0.1.0"
  rules:
    secret_patterns:
      patterns:
        - name: aws_access_key
          pattern: "AKIA[0-9A-Z]{16}"
          severity: critical
        - name: github_token
          pattern: "gh[ps]_[A-Za-z0-9]{36}"
          severity: critical
      skip_paths:
        - "**/test/**"
        - "**/fixtures/**"
cases:
  - description: "deny file containing AWS key"
    action:
      type: file_write
      target: "/src/config.js"
      content: "const key = 'AKIA1234567890ABCDEF';"
    expect: deny
  - description: "deny file containing GitHub token"
    action:
      type: file_write
      target: "/src/auth.js"
      content: "token = 'ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij'"
    expect: deny
  - description: "allow file without secrets"
    action:
      type: file_write
      target: "/src/main.js"
      content: "console.log('hello world');"
    expect: allow
  - description: "allow secret in skip_paths"
    action:
      type: file_write
      target: "/test/fixtures/sample.js"
      content: "const key = 'AKIA1234567890ABCDEF';"
    expect: allow
